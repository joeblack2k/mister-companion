name: MiSTer-Companion

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:

  # ============================================================
  # Windows Build
  # ============================================================
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller paramiko requests websocket-client psutil PyQt6

      - name: List Files
        working-directory: mister-companion
        run: |
          pwd
          dir
          dir assets

      - name: Build Executable
        working-directory: mister-companion
        run: pyinstaller --clean --onefile --windowed --icon app.ico --add-data "assets/icon.png;assets" --name MiSTer-Companion main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSTer-Companion-Windows-x86_64
          path: mister-companion/dist/MiSTer-Companion.exe


  # ============================================================
  # Linux Build
  # ============================================================
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller paramiko requests websocket-client psutil PyQt6

      - name: List Files
        working-directory: mister-companion
        run: |
          pwd
          ls -la
          ls -la assets

      - name: Build Executable
        working-directory: mister-companion
        run: pyinstaller --clean --onefile --windowed --add-data "assets/icon.png:assets" --name MiSTer-Companion main.py

      - name: Make binary executable
        run: chmod +x mister-companion/dist/MiSTer-Companion

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSTer-Companion-Linux-x86_64
          path: mister-companion/dist/MiSTer-Companion


  # ============================================================
  # macOS Intel Build
  # ============================================================
  build-macos-intel:
    name: Build macOS Intel App
    runs-on: macos-15-intel

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller paramiko requests websocket-client psutil PyQt6

      - name: List Files
        working-directory: mister-companion
        run: |
          pwd
          ls -la
          ls -la assets

      - name: Build macOS Intel App
        working-directory: mister-companion
        run: pyinstaller --clean --windowed --icon app.icns --add-data "assets/icon.png:assets" --osx-bundle-identifier "com.anime0t4ku.mistercompanion" --name MiSTer-Companion main.py

      - name: Create Intel DMG
        working-directory: mister-companion
        run: hdiutil create -volname "MiSTer Companion" -srcfolder "dist/MiSTer-Companion.app" -ov -format UDZO "../MiSTer-Companion-macOS-Intel.dmg"

      - name: Upload macOS Intel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSTer-Companion-macOS-Intel
          path: MiSTer-Companion-macOS-Intel.dmg


  # ============================================================
  # Pre-release Creation
  # ============================================================
  release:
    name: Create / Update Pre-release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos-intel
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Zip Windows Build
        run: |
          cd dist
          zip ../MiSTer-Companion-Windows-x86_64.zip MiSTer-Companion.exe

      - name: Package Linux Build (.tar.gz)
        run: |
          cd dist
          tar -czvf ../MiSTer-Companion-Linux-x86_64.tar.gz MiSTer-Companion

      - name: Move macOS Intel DMG
        run: mv dist/MiSTer-Companion-macOS-Intel.dmg ./MiSTer-Companion-macOS-Intel.dmg

      - name: Recreate Pre-release Tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          gh release delete Pre-release --yes --cleanup-tag || true

          git tag -f Pre-release
          git push origin refs/tags/Pre-release

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          tag: Pre-release
          artifacts: |
            MiSTer-Companion-Windows-x86_64.zip
            MiSTer-Companion-Linux-x86_64.tar.gz
            MiSTer-Companion-macOS-Intel.dmg