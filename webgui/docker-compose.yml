services:
  mister-companion-web:
    image: ghcr.io/joeblack2k/mister-companion:latest
    container_name: mister-companion-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_CONFIG_DIR: /config
      APP_DATA_DIR: /data
      FLASH_HELPER_URL: http://192.168.2.22:18080
      FLASH_HELPER_TOKEN_FILE: /config/flash-helper-token
      FLASH_HELPER_DATA_PREFIX: /opt/stacks/mister-companion-web/data
    volumes:
      - /opt/stacks/mister-companion-web/config:/config
      - /opt/stacks/mister-companion-web/data:/data
